<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>For NATSUMI — Happy 42nd Birthday</title>

<!-- ============================================================
     N A T S U M I の7文字 = 7つの扉。
     円の中で光っている文字の瞬間にタップすると、
     その文字の世界（演出・色・メッセージ）に分岐します。

     編集する場所は下の <script id="CONFIG"> の中だけでOK。
     名前・日付・各扉のメッセージはそこで書き換えられます。
     ============================================================ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400;500&family=Klee+One:wght@400;600&display=swap" rel="stylesheet">

<style>
  :root{
    --gold:        #d4af37;
    --gold-bright: #f7e7a6;
    --gold-deep:   #9a7b1f;
    --sec:         #f7e7a6;       /* 扉ごとに切り替わる第2アクセント */
    --bg:          #050505;
    --ink:         #f4efe3;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ -webkit-text-size-adjust:100%; text-size-adjust:100%; }
  html,body{ background:var(--bg); color:var(--ink); overscroll-behavior:none; }
  body{
    font-family:"Jost","Cormorant Garamond",serif;
    overflow-x:hidden; -webkit-font-smoothing:antialiased; letter-spacing:.02em;
    -webkit-tap-highlight-color:transparent; text-rendering:optimizeLegibility;
  }
  body.locked{ overflow:hidden; height:100vh; height:100svh; touch-action:none; }

  .gold{
    background:linear-gradient(100deg,var(--gold-deep) 0%,var(--gold) 22%,var(--gold-bright) 42%,
      #fffbe9 50%,var(--gold-bright) 58%,var(--gold) 78%,var(--gold-deep) 100%);
    background-size:250% 100%;
    -webkit-background-clip:text; background-clip:text;
    -webkit-text-fill-color:transparent; color:transparent;
    animation:shimmer 7s linear infinite;
  }
  @keyframes shimmer{ to{ background-position:250% 0; } }

  /* タップした文字＝翡翠色（どの扉を選んだかの印） */
  .jade, .jade *{ color:#34d6b4 !important; -webkit-text-fill-color:#34d6b4 !important; text-shadow:0 0 16px rgba(52,214,180,.55); }

  /* 背景キャンバス */
  #bg{ position:fixed; inset:0; z-index:0; pointer-events:none; }

  /* ===== TAP TO BEGIN ===== */
  #gate{
    position:fixed; inset:0; z-index:90;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:radial-gradient(circle at 50% 50%, #0a0908 0%, #000 80%);
    cursor:pointer; transition:opacity 1.6s ease; text-align:center; padding:6vw;
  }
  #gate.gone{ opacity:0; pointer-events:none; }
  #gate .ring{
    width:clamp(120px,18vw,180px); height:clamp(120px,18vw,180px);
    border:1px solid rgba(212,175,55,.35); border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    margin-bottom:5vh; position:relative; animation:breathe 3.4s ease-in-out infinite;
  }
  #gate .ring::before{
    content:""; position:absolute; inset:-1px; border-radius:50%;
    border:1px solid transparent; border-top-color:var(--gold);
    animation:spin 5s linear infinite; opacity:.7;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes breathe{ 0%,100%{ transform:scale(1);} 50%{ transform:scale(1.06);} }
  #gate .ring span{ font-family:"Cinzel"; font-size:clamp(2.2rem,8vw,3.6rem); transition:opacity .22s ease, transform .22s ease; }
  #gate .tap{ font-family:"Cinzel"; letter-spacing:.55em; text-indent:.55em; font-size:clamp(.7rem,2.6vw,1rem); color:var(--gold-bright); animation:pulse 2.6s ease-in-out infinite; }
  #gate .sub{ margin-top:2.2vh; font-family:"Cormorant Garamond"; font-style:italic; font-size:clamp(.8rem,3vw,1.05rem); color:rgba(244,239,227,.42); letter-spacing:.1em; max-width:24em; }
  @keyframes pulse{ 0%,100%{ opacity:.4;} 50%{ opacity:1;} }

  /* ===== シネマティック導入 ===== */
  #cinema{ position:fixed; inset:0; z-index:80; display:none; align-items:center; justify-content:center; background:#000; text-align:center; padding:6vw; }
  #cinema.show{ display:flex; }
  #cinema.fade{ animation:cinemaOut .3s ease forwards; }
  @keyframes cinemaOut{ to{ opacity:0; visibility:hidden; } }
  .cine-line{ position:absolute; opacity:0; width:90%; }
  .cine-date{ font-family:"Cinzel"; letter-spacing:.5em; text-indent:.5em; font-size:clamp(.85rem,3.4vw,1.5rem); }
  #cConcept{ display:flex; flex-direction:column; gap:1.4vh; }
  .cc-name{ font-family:"Cinzel"; font-weight:600; letter-spacing:.34em; text-indent:.34em; font-size:clamp(1.4rem,6vw,3rem); }
  .cc-tag{ font-family:"Cormorant Garamond"; font-style:italic; font-size:clamp(1rem,3.6vw,1.5rem); color:rgba(244,239,227,.6); }
  .fade-io{ animation:fadeIO 3s ease forwards; }
  .fade-io-long{ animation:fadeIO 3.8s ease forwards; }   /* 世界名は読めるよう長めに */
  @keyframes fadeIO{ 0%{opacity:0;transform:translateY(14px);} 22%,72%{opacity:1;transform:none;} 100%{opacity:0;transform:translateY(-14px);} }

  .cine-name{ font-family:"Cinzel"; font-weight:600; font-size:clamp(2.6rem,13vw,8rem); letter-spacing:.06em; color:var(--gold); text-shadow:0 0 36px var(--sec); opacity:0; }
  .cine-name.go{ opacity:1; }
  .cine-name span{ display:inline-block; opacity:0; }

  .cine-count{ position:absolute; bottom:15%; left:0; width:100%; font-family:"Cinzel"; font-weight:600; font-size:clamp(2.4rem,10vw,5rem); color:var(--gold); text-shadow:0 0 34px var(--sec); opacity:0; pointer-events:none; transition:opacity .3s ease; }
  .cine-count.tick{ animation:countPop .9s ease; }
  @keyframes countPop{ 0%{opacity:0;transform:scale(1.22);} 20%{opacity:1;transform:scale(1);} 72%{opacity:1;transform:scale(1);} 100%{opacity:0;transform:scale(.92);} }

  /* 7種の名前リビール */
  .anim-glow span{ animation:a-glow 1.6s ease forwards; }
  @keyframes a-glow{ 0%{opacity:0;filter:blur(16px);transform:scale(1.12);} 100%{opacity:1;filter:blur(0);transform:none;} }
  .anim-type span{ animation:a-type .01s steps(1) forwards; }
  @keyframes a-type{ to{opacity:1;} }
  .anim-pop span{ animation:a-pop .9s cubic-bezier(.2,1.5,.4,1) forwards; }
  @keyframes a-pop{ 0%{opacity:0;transform:scale(0) rotate(-18deg);} 100%{opacity:1;transform:none;} }
  .anim-zoom span{ animation:a-zoom 1.4s ease forwards; }
  @keyframes a-zoom{ 0%{opacity:0;transform:scale(3.4);filter:blur(22px);} 60%{opacity:1;} 100%{opacity:1;transform:none;filter:none;} }
  .anim-split span{ animation:a-split 1.2s ease forwards; transform-origin:center; }
  @keyframes a-split{ 0%{opacity:0;transform:scaleY(0) translateY(.4em);} 100%{opacity:1;transform:none;} }
  .anim-light span{ animation:a-light 1s ease forwards; }
  @keyframes a-light{ 0%{opacity:0;filter:brightness(.2) blur(3px);} 100%{opacity:1;filter:none;} }
  .anim-converge span{ animation:a-cvg 1.2s ease forwards; }
  @keyframes a-cvg{ 0%{opacity:0;transform:translate(var(--dx,0),-50px) scale(1.7);filter:blur(6px);} 100%{opacity:1;transform:none;filter:none;} }

  /* ===== 本編 ===== */
  main{ position:relative; z-index:10; opacity:0; }     /* 着地までは隠す（42のチラ見え防止） */
  main.reveal{ opacity:1; transition:opacity .6s ease; }
  section{ min-height:100vh; min-height:100svh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:12vh 7vw; text-align:center; }
  #hero{ gap:3vh; }
  #hero .kicker{ font-family:"Cinzel"; letter-spacing:.42em; text-indent:.42em; font-size:clamp(.6rem,2.4vw,.95rem); color:rgba(244,239,227,.62); }
  #hero h1{ font-family:"Cinzel"; font-weight:500; line-height:1; font-size:clamp(1.7rem,7vw,3.8rem); letter-spacing:.16em; text-indent:.16em; text-shadow:0 0 40px var(--sec); white-space:nowrap; }
  #hero .name{ font-family:"Cinzel"; font-weight:500; letter-spacing:.32em; text-indent:.32em; font-size:clamp(1rem,4.4vw,2rem); }
  .divider{ width:1px; height:9vh; background:linear-gradient(var(--sec),transparent); margin-top:2vh; opacity:.7; }
  .scroll-hint{ font-family:"Cormorant Garamond"; font-style:italic; font-size:.9rem; color:rgba(244,239,227,.4); margin-top:1.5vh; animation:pulse 2.6s ease-in-out infinite; }

  .word{ font-family:"Cormorant Garamond"; font-style:italic; font-weight:400; font-size:clamp(1.5rem,6.2vw,3.4rem); line-height:1.6; max-width:16em; letter-spacing:.03em; opacity:0; transform:translateY(40px); transition:opacity 1.4s ease, transform 1.4s ease; filter:blur(4px); }
  .word.in{ opacity:1; transform:none; filter:none; }

  #finale{ gap:4vh; }
  #finale .love{ font-family:"Cinzel"; font-weight:700; letter-spacing:.18em; text-indent:.18em; font-size:clamp(2rem,11vw,6rem); line-height:1.1; opacity:0; transform:scale(.9); transition:opacity 1.8s ease, transform 1.8s ease; text-shadow:0 0 50px var(--sec); }
  #finale .love.in{ opacity:1; transform:none; }
  #finale .love-jp{ font-family:"Hiragino Mincho ProN","Yu Mincho","Shippori Mincho",serif; font-weight:500;
    font-size:clamp(1.15rem,5vw,2rem); letter-spacing:.2em; text-indent:.2em; color:var(--gold-bright);
    text-shadow:0 0 24px var(--sec); opacity:0; transform:translateY(12px);
    transition:opacity 1.8s ease .7s, transform 1.8s ease .7s; }
  #finale .love-jp.in{ opacity:1; transform:none; }
  #finale .sign{ font-family:"Cormorant Garamond"; font-style:italic; font-size:clamp(1rem,4vw,1.5rem); color:rgba(244,239,227,.72); opacity:0; transition:opacity 2s ease 1s; }
  #finale .sign.in{ opacity:1; }
  #replay{ margin-top:3vh; background:transparent; cursor:pointer; border:1px solid var(--sec); color:var(--gold-bright); font-family:"Cinzel"; letter-spacing:.3em; text-indent:.3em; font-size:.7rem; padding:1em 2.2em; border-radius:40px; opacity:0; transition:opacity 2s ease 1.6s, background .4s; }
  #replay.in{ opacity:1; }
  #replay:hover{ background:rgba(212,175,55,.12); }
  #replay{ touch-action:manipulation; }
  .replay-note{ font-family:"Cormorant Garamond"; font-style:italic; font-size:.85rem; color:rgba(244,239,227,.4); margin-top:1.4vh; opacity:0; transition:opacity 2s ease 1.8s; }
  .replay-note.in{ opacity:1; }

  /* ===== 本棚（フィナーレの先・人生の蔵書） ===== */
  #bookshelf{ gap:5vh; }
  .shelf-kicker{ font-family:"Cinzel"; letter-spacing:.42em; text-indent:.42em; font-size:clamp(.6rem,2.4vw,.95rem); color:rgba(244,239,227,.55); }
  /* 本棚の筐体（木枠＋金の縁＋背板＋棚板） */
  .bookcase{ position:relative; width:min(94vw,780px); padding:16px 16px 0; border-radius:8px;
    background:linear-gradient(180deg,#17120c,#0b0805);
    box-shadow:0 0 0 2px #2a2110, 0 0 0 3px rgba(212,175,55,.28), inset 0 0 55px rgba(0,0,0,.6), 0 38px 75px rgba(0,0,0,.62); }
  .shelf + .shelf{ margin-top:14px; }
  .books{ position:relative; display:flex; align-items:flex-end; flex-wrap:nowrap; gap:clamp(2px,.6vw,5px); height:clamp(120px,23vh,210px); padding:0; }
  .shelf:first-child .books{ justify-content:space-between; }   /* 上段：端から端まで */
  .shelf:last-child  .books{ justify-content:flex-start; }      /* 下段：左詰め（右に未来の余白） */
  .plank{ height:15px; margin:4px -16px 0; border-radius:0 0 4px 4px;
    background:linear-gradient(180deg,#3c2f16,#1a1308); box-shadow:inset 0 2px 0 rgba(212,175,55,.32), inset 0 -3px 6px rgba(0,0,0,.5); }
  .shelf:last-child .plank{ border-radius:0 0 8px 8px; }
  /* 一冊一冊（金箔押しの蔵書） */
  .book{ --c:#c9a227; flex:0 1 auto; min-width:0; width:clamp(6px,1.7vw,15px); border-radius:2px 2px 0 0;
    background:linear-gradient(90deg, rgba(255,255,255,.18), rgba(255,255,255,0) 38%, rgba(0,0,0,.30)), var(--c);
    opacity:0; transform:translateY(46px); transition:transform .7s ease, opacity .7s ease;
    box-shadow:inset -1px 0 0 rgba(0,0,0,.38); position:relative; }
  .book.w1{ width:clamp(9px,2.2vw,16px); }
  .book.w2{ width:clamp(11px,2.7vw,20px); }
  .book.w3{ width:clamp(14px,3.2vw,26px); }
  .book.w4{ width:clamp(17px,3.8vw,32px); }
  .book::before{ content:""; position:absolute; left:0; right:0; top:16%; height:20%;
    background:rgba(0,0,0,.22); border-top:1px solid rgba(247,231,166,.45); border-bottom:1px solid rgba(247,231,166,.45); }
  /* 人生の節目の本（革装丁＋金の縦書きタイトル） */
  .book.milestone{ width:clamp(20px,4.6vw,36px); --c:#241a0a; box-shadow:inset -1px 0 0 rgba(0,0,0,.5), inset 1px 0 0 rgba(255,255,255,.06); }
  .book.milestone::before{ display:none; }
  .book.milestone .title{ position:absolute; inset:8% 0; margin:auto; writing-mode:vertical-rl; text-orientation:upright;
    font-family:"Hiragino Mincho ProN","Yu Mincho","Shippori Mincho",serif; font-weight:600;
    font-size:clamp(10px,2.6vw,15px); letter-spacing:.06em; line-height:1.08; white-space:nowrap;
    display:flex; align-items:center; justify-content:center; color:#ecd98f; text-shadow:0 0 4px rgba(0,0,0,.8); }
  .books.rise .book:not(.new){ opacity:1; transform:none; }
  /* 最新刊 2026 */
  .book.new{ --c:#f3dd8e; width:clamp(19px,4.8vw,37px);
    background:linear-gradient(90deg, rgba(255,255,255,.30), rgba(255,255,255,0) 40%, rgba(0,0,0,.16)), linear-gradient(180deg,#fffbe9,var(--gold));
    opacity:0; transform:translateY(-98px) rotate(7deg); }
  .book.new::before{ background:rgba(255,255,255,.20); border-top-color:rgba(120,90,10,.6); border-bottom-color:rgba(120,90,10,.6); }
  .books.rise .book.new.reveal{ opacity:1; transform:none;
    transition:transform 1.1s cubic-bezier(.18,1.35,.3,1), opacity .8s ease, box-shadow 1s ease;
    box-shadow:0 0 24px var(--sec), 0 0 54px rgba(212,175,55,.5); }
  .book.new{ cursor:pointer; }
  .book.new.await{ animation:newPulse 1.7s ease-in-out infinite; }
  @keyframes newPulse{ 0%,100%{ box-shadow:0 0 20px var(--sec), 0 0 38px rgba(212,175,55,.32);} 50%{ box-shadow:0 0 34px var(--sec), 0 0 72px rgba(212,175,55,.6);} }
  .tap-hint{ font-family:"Cormorant Garamond"; font-style:italic; font-size:clamp(.95rem,3.6vw,1.3rem); letter-spacing:.12em;
    color:var(--gold-bright); cursor:pointer; opacity:0; transition:opacity 1s ease; text-shadow:0 0 16px var(--sec); }
  .tap-hint.in{ opacity:1; animation:hintPulse 2.4s ease-in-out infinite; }
  @keyframes hintPulse{ 0%,100%{ opacity:.55; } 50%{ opacity:1; } }
  .book.new .title{ position:absolute; inset:8% 0; margin:auto; writing-mode:vertical-rl; text-orientation:upright;
    font-family:"Cinzel",serif; font-weight:700; font-size:clamp(10px,2.6vw,16px); letter-spacing:.08em; line-height:1.1;
    display:flex; align-items:center; justify-content:center; white-space:nowrap; color:#4a3608; text-shadow:0 0 3px rgba(255,255,255,.55);
    opacity:0; transition:opacity .9s ease .4s; }
  .book.new.reveal .title{ opacity:1; }
  .shelf-caption{ opacity:0; transform:translateY(14px); transition:opacity 1.4s ease, transform 1.4s ease; }
  .shelf-caption.in{ opacity:1; transform:none; }
  .sc-en{ font-family:"Cormorant Garamond"; font-style:italic; font-size:clamp(1.1rem,4.4vw,1.8rem); color:var(--gold-bright); }
  .sc-jp{ font-family:"Hiragino Mincho ProN","Yu Mincho","Shippori Mincho",serif; font-size:clamp(1rem,4vw,1.5rem); letter-spacing:.16em; text-indent:.16em; color:rgba(244,239,227,.82); margin-top:1.6vh; }

  /* ===== 最新刊に書き入れる場面（ガラスペン） ===== */
  .ob{ position:fixed; inset:0; z-index:85; display:flex; align-items:center; justify-content:center; padding:6vw;
    background:radial-gradient(circle at 50% 45%, rgba(12,9,5,.55), rgba(0,0,0,.9));
    opacity:0; visibility:hidden; transition:opacity .8s ease, visibility .8s; }
  .ob.show{ opacity:1; visibility:visible; }
  .ob-book{ position:relative; display:flex; width:min(88vw,720px); height:min(58vh,440px);
    filter:drop-shadow(0 34px 66px rgba(0,0,0,.65)); transform-origin:center; }
  .ob.show .ob-book{ animation:obIn .9s cubic-bezier(.2,1,.3,1) both; }
  @keyframes obIn{ from{ transform:translateY(20px) scale(.92); opacity:0; } to{ transform:none; opacity:1; } }
  .ob-page{ flex:1 1 50%; position:relative; }
  .ob-page.left{ border-radius:7px 0 0 7px; background:linear-gradient(90deg,#efe6cd,rgba(120,95,50,.16)),linear-gradient(180deg,#f6efdc,#e7dabd); box-shadow:inset -16px 0 28px rgba(120,95,50,.22); }
  .ob-page.right{ border-radius:0 7px 7px 0; background:linear-gradient(270deg,#efe6cd,rgba(120,95,50,.16)),linear-gradient(180deg,#f6efdc,#e7dabd); box-shadow:inset 16px 0 28px rgba(120,95,50,.22); }
  .ob-book::before{ content:""; position:absolute; left:50%; top:2%; bottom:2%; width:2px; transform:translateX(-1px); background:linear-gradient(rgba(90,70,35,.45),rgba(60,45,20,.6)); z-index:3; }
  .ob-write{ position:absolute; inset:0; z-index:4; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:5% 7%; }
  /* レビュー面：英文＋日本語訳（1ページ1英文・スワイプでめくる） */
  .ob-review{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; padding:8% 8% 13%;
    opacity:0; transition:opacity .7s ease; cursor:pointer; perspective:1400px; }
  .ob-review.in{ opacity:1; }
  .ob-review.hide{ opacity:0; }
  .rv-content{ width:100%; max-width:92%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .rv-en{ font-family:"Cormorant Garamond"; font-style:italic; color:#6a5535; font-size:clamp(1rem,4vw,1.7rem); line-height:1.35; }
  .rv-ja{ font-family:"Hiragino Mincho ProN","Yu Mincho","Shippori Mincho",serif; color:#3f3015; font-size:clamp(1.05rem,4.3vw,1.75rem); line-height:1.5; margin-top:.4em; }
  .rv-count{ margin-top:1.3em; font-family:"Cinzel"; color:#9a7b3b; font-size:clamp(.68rem,2.3vw,.9rem); letter-spacing:.22em; text-indent:.22em; }
  .rv-nav{ position:absolute; bottom:6%; left:0; right:0; text-align:center; font-family:"Hiragino Mincho ProN","Yu Mincho",serif; color:#9a7b3b; font-size:clamp(.78rem,2.7vw,1.05rem); letter-spacing:.14em; animation:hintPulse 2.2s ease-in-out infinite; }
  .rv-leaf{ position:absolute; top:5%; bottom:5%; left:50%; right:5%; transform-origin:left center; transform:rotateY(0deg);
    opacity:0; pointer-events:none; z-index:6; backface-visibility:hidden; border-radius:0 7px 7px 0;
    background:linear-gradient(90deg,#f1e8cf,#e0d2b0); box-shadow:-10px 0 22px rgba(0,0,0,.28); }
  .rv-leaf.turn{ animation:leafTurn .82s cubic-bezier(.4,.05,.3,1) forwards; }
  @keyframes leafTurn{ 0%{opacity:1; transform:rotateY(0deg);} 100%{opacity:1; transform:rotateY(-172deg);} }
  .ob-inscribe{ display:none; flex-direction:column; align-items:center; justify-content:center; gap:.4em; }
  .ink-row{ display:block; text-align:center; }
  .ink-line{ position:relative; display:inline-block; font-family:"Klee One",cursive; color:#46361c; font-size:clamp(1.3rem,6vw,2.6rem); line-height:1.7; }
  .ink-line .ink-text{ display:inline-block; clip-path:inset(0 100% 0 0); }
  .ink-line.go .ink-text{ animation:write var(--d,1.4s) cubic-bezier(.36,.06,.5,1) forwards; }
  @keyframes write{ from{ clip-path:inset(0 100% 0 0);} to{ clip-path:inset(0 0 0 0);} }
  .ink-line .pen{ position:absolute; bottom:.18em; left:0; width:3px; height:2.3em; transform:rotate(36deg); transform-origin:bottom left;
    background:linear-gradient(to top, rgba(150,210,230,.25), rgba(255,255,255,.92)); border-radius:2px; box-shadow:0 0 8px rgba(170,225,240,.85); opacity:0; }
  .ink-line .pen::after{ content:""; position:absolute; bottom:-5px; left:-1px; width:0; height:0; border-left:2px solid transparent; border-right:2px solid transparent; border-top:7px solid rgba(110,150,170,.95); }
  .ink-line.go .pen{ animation:penmove var(--d,1.4s) cubic-bezier(.36,.06,.5,1) forwards, penwobble .55s ease-in-out infinite; }
  @keyframes penmove{ 0%{opacity:1; left:0;} 88%{opacity:1;} 100%{opacity:0; left:100%;} }
  @keyframes penwobble{ 0%,100%{ transform:rotate(36deg) translateY(0);} 50%{ transform:rotate(33deg) translateY(-1.6px);} }
  .ob-cover{ position:absolute; top:0; bottom:0; left:25%; width:50%; border-radius:7px; opacity:0; z-index:5;

<script>
(()=>{
  "use strict";
  const CFG = JSON.parse(document.getElementById('CONFIG').textContent);
  const $ = s => document.querySelector(s);
  const GOLD = '#d4af37';
  let SEC = '#f7e7a6';

  /* 各扉の演出パラメータ（見た目エンジンは固定。文字はCONFIGで編集） */
  const ENGINE = {
    N:{ sec:"#cfe0ff", bg:"stars",   nameAnim:"converge", stagger:90,  finale:"fireworks" },
    A:{ sec:"#7ef0c8", bg:"aurora",  nameAnim:"glow",     stagger:70,  finale:"embers"    },
    T:{ sec:"#e8c879", bg:"dust",    nameAnim:"type",     stagger:150, finale:"confetti"  },
    S:{ sec:"#ffd9a8", bg:"sparkle", nameAnim:"pop",      stagger:85,  finale:"fireworks" },
    U:{ sec:"#b7a6ff", bg:"orbit",   nameAnim:"zoom",     stagger:70,  finale:"fireworks" },
    M:{ sec:"#e6b3a0", bg:"mirror",  nameAnim:"split",    stagger:70,  finale:"confetti"  },
    I:{ sec:"#ffba6b", bg:"candle",  nameAnim:"light",    stagger:175, finale:"embers"    }
  };
  const ord = n => { const s=["th","st","nd","rd"],v=n%100; return s[(v-20)%10]||s[v]||s[0]; };
  const rgba = (hex,a)=>{ hex=hex.replace('#',''); if(hex.length===3) hex=hex.split('').map(c=>c+c).join('');
    const n=parseInt(hex,16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; };
  // タップした文字Lを翡翠spanで包む（英文中の同じ文字も対象）
  const hl = (t,L)=>{ if(!t) return ''; return String(t).replace(new RegExp('('+L+')','gi'),'<span class="jade">$1</span>'); };
  // 訪問記録を送信（画像ビーコン・CORS不要・送りっぱなし）
  function track(ev,door){ try{ if(!CFG.track) return;
    const u=CFG.track+(CFG.track.indexOf('?')<0?'?':'&')+'event='+encodeURIComponent(ev)
      +'&door='+encodeURIComponent(door||'')+'&t='+Date.now();
    new Image().src=u; }catch(e){} }

  /* 共通DOM */
  $('#bigNum').textContent = CFG.birthYear + '  —  ' + CFG.year;   // 1984 — 2026（人生の幅で表現）
  $('#heroName').textContent=CFG.name;
  $('#cDate').textContent=CFG.dateLabel;
  $('#loveText').textContent=CFG.love;
  $('#signText').textContent=CFG.sign;

  /* ===== リングの文字を巡回 ===== */
  const ringSpan=$('.ring span');
  const ringLetters=(CFG.name||"N").toUpperCase().replace(/[^A-Z]/g,'').split('');
  let _li=0; ringSpan.textContent=ringLetters[0];
  setInterval(()=>{
    if(started) return;
    ringSpan.style.opacity=0; ringSpan.style.transform='scale(.7)';
    setTimeout(()=>{ _li=(_li+1)%ringLetters.length; ringSpan.textContent=ringLetters[_li];
      ringSpan.style.opacity=1; ringSpan.style.transform='scale(1)'; },220);
  },760);

  /* ===== 背景キャンバス ===== */
  const bg=$('#bg'), bctx=bg.getContext('2d');
  let W,H,dpr=Math.min(devicePixelRatio||1,2), BG='dust', E={};
  function sizeBG(){ W=innerWidth; H=innerHeight; bg.width=W*dpr; bg.height=H*dpr;
    bg.style.width=W+'px'; bg.style.height=H+'px'; bctx.setTransform(dpr,0,0,dpr,0,0); }
  function initBG(name){
    BG=name; E={};
    if(name==='dust'){ E.p=Array.from({length:Math.min(80,(W/14)|0)},()=>({x:Math.random()*W,y:Math.random()*H,r:.4+Math.random()*1.6,a:.05+Math.random()*.5,vy:.1+Math.random()*.5,ph:Math.random()*6.3,va:.005+Math.random()*.02})); }
    if(name==='stars'){ const N=Math.min(150,((W*H)/8500)|0);
      E.stars=Array.from({length:N},()=>({x:Math.random()*W,y:Math.random()*H,r:.4+Math.random()*1.8,base:.3+Math.random()*.6,ph:Math.random()*6.3,sp:.5+Math.random()*1.5,gold:Math.random()<.4}));
      E.bright=[]; for(let i=0;i<E.stars.length&&E.bright.length<16;i++) if(E.stars[i].r>1.4) E.bright.push(i);
      E.shoot=[]; E.nextShoot=1; }
    if(name==='aurora'){ E.rib=Array.from({length:4},(_,i)=>({cx:.18+i*.21+Math.random()*.06,amp:40+Math.random()*70,freq:.004+Math.random()*.004,sp:.3+Math.random()*.5,phase:Math.random()*6.3,w:60+Math.random()*70,a:.05+Math.random()*.06,col:i%2?SEC:GOLD})); }
    if(name==='sparkle'){ E.sp=[]; E.p=Array.from({length:40},()=>({x:Math.random()*W,y:Math.random()*H,r:.4+Math.random()*1.2,a:.05+Math.random()*.35,vy:.05+Math.random()*.3,ph:Math.random()*6.3,va:.005+Math.random()*.02})); }
    if(name==='orbit'){ E.o=Array.from({length:70},()=>{ const r=40+Math.random()*Math.min(W,H)*.42; return {r,ang:Math.random()*6.3,sp:(Math.random()<.5?1:-1)*(.002+Math.random()*.006),size:.6+Math.random()*2.2,a:.3+Math.random()*.5,col:Math.random()<.5?GOLD:SEC}; }); }
    if(name==='mirror'){ E.m=Array.from({length:30},()=>({x:Math.random()*W/2,y:Math.random()*H/2,vx:(Math.random()-.5)*1.1,vy:(Math.random()-.5)*1.1,r:1+Math.random()*2.4,a:.4+Math.random()*.4,col:Math.random()<.5?GOLD:SEC})); }
    if(name==='candle'){ E.em=[]; }
  }
  function drawBG(){
    bctx.clearRect(0,0,W,H);
    if(BG==='dust'||BG==='sparkle'){ for(const p of E.p){ p.ph+=p.va; p.y-=p.vy; if(p.y<-5){p.y=H+5;p.x=Math.random()*W;}
      const tw=p.a*(.6+.4*Math.sin(p.ph)); bctx.beginPath(); bctx.arc(p.x,p.y,p.r,0,6.283);
      bctx.fillStyle=rgba(GOLD,tw); bctx.shadowBlur=8; bctx.shadowColor=rgba(SEC,.6); bctx.fill(); } bctx.shadowBlur=0; }

    if(BG==='stars'){ const s=E;
      for(const st of s.stars){ const tw=st.base*(.5+.5*Math.sin(perf*st.sp+st.ph));
        bctx.beginPath(); bctx.arc(st.x,st.y,st.r,0,6.283); bctx.fillStyle=rgba(st.gold?GOLD:SEC,tw);
        bctx.shadowBlur=6; bctx.shadowColor=rgba(SEC,.8); bctx.fill(); } bctx.shadowBlur=0;
      bctx.lineWidth=.6;
      for(let i=0;i<s.bright.length;i++)for(let j=i+1;j<s.bright.length;j++){ const a=s.stars[s.bright[i]],b=s.stars[s.bright[j]];
        const d=Math.hypot(a.x-b.x,a.y-b.y); if(d<175){ bctx.strokeStyle=rgba(GOLD,(1-d/175)*.16);
        bctx.beginPath(); bctx.moveTo(a.x,a.y); bctx.lineTo(b.x,b.y); bctx.stroke(); } }
      if(perf>s.nextShoot){ s.nextShoot=perf+1.4+Math.random()*3.2; s.shoot.push({x:Math.random()*W*.8,y:Math.random()*H*.3,vx:7+Math.random()*4,vy:3+Math.random()*2,life:1}); }
      for(const sh of s.shoot){ sh.x+=sh.vx; sh.y+=sh.vy; sh.life-=.02;
        bctx.strokeStyle=rgba('#ffffff',Math.max(0,sh.life)); bctx.lineWidth=2;
        bctx.beginPath(); bctx.moveTo(sh.x,sh.y); bctx.lineTo(sh.x-sh.vx*8,sh.y-sh.vy*8); bctx.stroke(); }
      s.shoot=s.shoot.filter(o=>o.life>0&&o.x<W+60&&o.y<H+60); }

    if(BG==='aurora'){ bctx.globalCompositeOperation='lighter';
      for(const r of E.rib){ bctx.lineWidth=r.w;
        const g=bctx.createLinearGradient(0,0,0,H); g.addColorStop(0,rgba(r.col,0)); g.addColorStop(.5,rgba(r.col,r.a)); g.addColorStop(1,rgba(r.col,0));
        bctx.strokeStyle=g; bctx.beginPath();
        for(let y=0;y<=H;y+=16){ const x=r.cx*W+Math.sin(y*r.freq+perf*r.sp+r.phase)*r.amp; y===0?bctx.moveTo(x,y):bctx.lineTo(x,y); }
        bctx.stroke(); } bctx.globalCompositeOperation='source-over'; }

    if(BG==='sparkle'){ if(Math.random()<.09) E.sp.push({x:Math.random()*W,y:Math.random()*H,m:7+Math.random()*16,life:0,c:Math.random()<.5?GOLD:SEC});
      for(const k of E.sp){ k.life+=.045; const p=Math.sin(Math.min(k.life,Math.PI)); const s=k.m*p;
        bctx.save(); bctx.translate(k.x,k.y); bctx.strokeStyle=rgba(k.c,p); bctx.lineWidth=1.2; bctx.shadowBlur=8; bctx.shadowColor=rgba(k.c,p);
        bctx.beginPath(); bctx.moveTo(-s,0);bctx.lineTo(s,0);bctx.moveTo(0,-s);bctx.lineTo(0,s);
        bctx.moveTo(-s*.4,-s*.4);bctx.lineTo(s*.4,s*.4);bctx.moveTo(s*.4,-s*.4);bctx.lineTo(-s*.4,s*.4);
        bctx.stroke(); bctx.restore(); }
      E.sp=E.sp.filter(k=>k.life<Math.PI); bctx.shadowBlur=0; }

    if(BG==='orbit'){ const cx=W/2,cy=H/2;
      const g=bctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*.42); g.addColorStop(0,rgba(SEC,.12)); g.addColorStop(1,rgba(SEC,0));
      bctx.fillStyle=g; bctx.fillRect(0,0,W,H);
      for(const o of E.o){ o.ang+=o.sp; const x=cx+Math.cos(o.ang)*o.r, y=cy+Math.sin(o.ang)*o.r*.5;
        bctx.beginPath(); bctx.arc(x,y,o.size,0,6.283); bctx.fillStyle=rgba(o.col,o.a);
        bctx.shadowBlur=8; bctx.shadowColor=rgba(o.col,.8); bctx.fill(); } bctx.shadowBlur=0; }

    if(BG==='mirror'){ const cx=W/2,cy=H/2;
      for(const m of E.m){ m.x+=m.vx; m.y+=m.vy; if(m.x<0||m.x>cx)m.vx*=-1; if(m.y<0||m.y>cy)m.vy*=-1;
        const pts=[[m.x,m.y],[W-m.x,m.y],[m.x,H-m.y],[W-m.x,H-m.y]];
        for(const pt of pts){ bctx.beginPath(); bctx.arc(pt[0],pt[1],m.r,0,6.283); bctx.fillStyle=rgba(m.col,m.a);
          bctx.shadowBlur=6; bctx.shadowColor=rgba(m.col,.7); bctx.fill(); } } bctx.shadowBlur=0; }

    if(BG==='candle'){ const g=bctx.createLinearGradient(0,H,0,H*.5); g.addColorStop(0,rgba(SEC,.2)); g.addColorStop(1,rgba(SEC,0));
      bctx.fillStyle=g; bctx.fillRect(0,0,W,H);
      if(Math.random()<.45) E.em.push({x:Math.random()*W,y:H+5,vy:.4+Math.random()*1.3,r:1+Math.random()*2.4,a:.6+Math.random()*.4,ph:Math.random()*6.3,w:Math.random()<.3});
      for(const e of E.em){ e.y-=e.vy; e.x+=Math.sin(e.y*.02+e.ph)*.6; e.a-=.004;
        bctx.beginPath(); bctx.arc(e.x,e.y,e.r,0,6.283); bctx.fillStyle=rgba(e.w?'#fff1c0':SEC,Math.max(0,e.a));
        bctx.shadowBlur=10; bctx.shadowColor=rgba(SEC,.9); bctx.fill(); } bctx.shadowBlur=0;
      E.em=E.em.filter(e=>e.a>0&&e.y>-10); }
  }
  let perf=0;
  function bgLoop(ts){ perf=ts*.001; drawBG(); requestAnimationFrame(bgLoop); }
  sizeBG(); initBG('dust'); requestAnimationFrame(bgLoop);
  addEventListener('resize',()=>{ sizeBG(); initBG(BG); });

  /* ===== サウンド（やさしい和音） ===== */
  let actx=null;
  /* 常時流れる静かなアンビエント（ファイル不要・自動生成） */
  let ambStarted=false;
  function startAmbient(){
    if(ambStarted||!CFG.sound) return; ambStarted=true;
    try{
      actx = actx || new (window.AudioContext||window.webkitAudioContext)();
      if(actx.state==='suspended') actx.resume();
      const now=actx.currentTime;
      const master=actx.createGain(); master.gain.setValueAtTime(0.0001,now);
      master.gain.exponentialRampToValueAtTime(0.085, now+5);   // 5秒かけてそっと立ち上げ
      master.connect(actx.destination);
      const filt=actx.createBiquadFilter(); filt.type='lowpass'; filt.frequency.value=850; filt.Q.value=0.7; filt.connect(master);
      const notes=[130.81,196.00,261.63,329.63];                // C3 G3 C4 E4（暖かいCメジャー）
      notes.forEach((f,i)=>{
        [0,4].forEach(det=>{                                    // デチューンの相方を重ねて艶を出す
          const o=actx.createOscillator(); o.type='sine'; o.frequency.value=f; o.detune.value=det;
          const g=actx.createGain(); g.gain.value=0.16/notes.length; o.connect(g); g.connect(filt); o.start();
          const lfo=actx.createOscillator(); lfo.frequency.value=0.04+i*0.015;
          const lg=actx.createGain(); lg.gain.value=g.gain.value*0.5; lfo.connect(lg); lg.connect(g.gain); lfo.start();
        });
      });
      const flfo=actx.createOscillator(); flfo.frequency.value=0.025;        // ゆっくり音色が揺らぐ
      const flg=actx.createGain(); flg.gain.value=350; flfo.connect(flg); flg.connect(filt.frequency); flfo.start();
    }catch(e){}
  }
  function chord(base){ if(!CFG.sound) return;
    try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)();
      if(actx.state==='suspended') actx.resume();   // iOS対策：操作内で起こす
      const now=actx.currentTime, notes=base||[392,493.88,587.33,783.99];
      const master=actx.createGain(); master.connect(actx.destination);
      master.gain.setValueAtTime(.0001,now);
      master.gain.exponentialRampToValueAtTime(.12,now+.8);
      master.gain.exponentialRampToValueAtTime(.0001,now+6);
      notes.forEach((f,i)=>{ const o=actx.createOscillator(),g=actx.createGain(); o.type='sine'; o.frequency.value=f; g.gain.value=.25;
        o.connect(g); g.connect(master); o.start(now+i*.18); o.stop(now+6); });
    }catch(e){}
  }

  /* ===== テーマ適用 ===== */
  let theme=null;
  function applyTheme(letter){
    const eng=ENGINE[letter]||ENGINE.N;
    const txt=(CFG.themes&&CFG.themes[letter])||CFG.themes.N;
    theme={...eng,...txt,letter};
    SEC=theme.sec; document.documentElement.style.setProperty('--sec',SEC);
    const L=letter;
    // cinema concept（扉名はそのまま金、副題はタップ文字を翡翠に）
    $('#cConcept .cc-name').innerHTML=hl(theme.concept,L);   // 世界名のタップ文字も翡翠に
    $('#cConcept .cc-tag').innerHTML=hl(theme.tag,L);
    $('#kicker').innerHTML=hl(theme.tag,L);
    // hero の NATSUMI と I LOVE YOU もタップ文字を翡翠に
    $('#heroName').innerHTML=hl(CFG.name,L);
    $('#loveText').innerHTML=hl(CFG.love,L);
    $('#loveJp').textContent=CFG.loveJp||'';
    $('#signText').innerHTML=hl(CFG.sign,L);
    // words（英文中の同じ文字をすべて翡翠に）
    wordEls.forEach((el,i)=>{ const w=theme.words[i]; el.innerHTML=w?hl(w,L):""; el.classList.remove('in');
      el.closest('section').style.display = w? '' : 'none'; });
    initBG(theme.bg);
  }

  const wordEls=[...document.querySelectorAll('[data-word]')];

  /* ===== 名前リビール ===== */
  function revealName(animClass,stagger){
    const c=$('#cName'); c.className='cine-line cine-name'; c.innerHTML='';
    CFG.name.split('').forEach((ch,i)=>{ const s=document.createElement('span');
      s.textContent = ch===' '?' ':ch; s.style.animationDelay=(i*stagger)+'ms';
      if(animClass==='converge') s.style.setProperty('--dx',(i%2?80:-80)+'px');
      if(theme && ch.toUpperCase()===theme.letter) s.classList.add('jade');  // タップした文字を翡翠に
      c.appendChild(s); });
    void c.offsetWidth; c.classList.add('go','anim-'+animClass);
  }

  /* ===== 開始 ===== */
  const gate=$('#gate'), cinema=$('#cinema'), main=$('#main'), bodyEl=document.body;
  let started=false, cinemaTimers=[];
  function clearTimers(){ cinemaTimers.forEach(clearTimeout); cinemaTimers=[]; }
  const later=(fn,t)=>cinemaTimers.push(setTimeout(fn,t));

  function begin(){
    if(started) return; started=true;
    const letter=ringLetters[_li];
    applyTheme(letter);
    track('enter', letter);
    chord();
    gate.classList.add('gone');
    later(()=>{ gate.style.display='none'; runCinema(); },1500);
  }
  gate.addEventListener('click',begin);
  gate.addEventListener('touchstart',e=>{ e.preventDefault(); begin(); },{passive:false});

  function runCinema(){
    cinema.classList.add('show');
    // それぞれ約2.6秒間隔で、品よく順番に。fade-ioは3秒かけて出て消える。
    // 各表示は前のが完全に消えてから（間に黒の余白）出す＝重なり防止
    later(()=>$('#cDate').classList.add('fade-io'),       300); // 日付（〜3.3秒で消える）
    later(()=>$('#cConcept').classList.add('fade-io-long'),3400);// 世界名＋副題（〜7.2秒で消える）
    later(()=>revealName(theme.nameAnim,theme.stagger),   7300);// NATSUMI（世界名が消えてから登場）
    later(()=>runCountdown(endCinema),                    9600);// 名前が出揃ってからカウント
  }
  function runCountdown(done){
    const el=$('#cCount'); let n=5;
    const tick=()=>{
      el.textContent=n; el.classList.remove('tick'); void el.offsetWidth; el.classList.add('tick');
      if(n===1){
        later(()=>{ el.classList.remove('tick'); el.style.opacity='0'; }, 450); // 「1」を見せてから消す
        later(done, 800);                           // カウント間隔と同じ0.8秒の間を置いて遷移
        return;
      }
      n--; later(tick,800);                        // 5→4→3→2→1 各0.8秒
    };
    tick();
  }
  function endCinema(){
    chord([523.25,659.25,783.99,1046.5]);        // 着地の明るい和音
    cinema.classList.add('fade');                 // 0.3秒でパッと幕引き
    later(()=>{ cinema.style.display='none'; bodyEl.classList.remove('locked');
      main.setAttribute('aria-hidden','false'); main.classList.add('reveal'); window.scrollTo(0,0); },300);
  }

  /* ===== スクロールで言葉 ===== */
  const ioWords=new IntersectionObserver((es)=>{ es.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('in'); }); },{threshold:.4});
  wordEls.forEach(el=>ioWords.observe(el));

  const finale=$('#finale'), loveText=$('#loveText'), loveJp=$('#loveJp'), signText=$('#signText'), replay=$('#replay');
  new IntersectionObserver((es)=>{ es.forEach(e=>{ if(e.isIntersecting){
      loveText.classList.add('in'); loveJp.classList.add('in'); signText.classList.add('in'); fireFinale();
    }}); },{threshold:.5}).observe(finale);

  /* ===== 本棚：人生の蔵書（最後の場面） ===== */
  function buildBooks(){
    const r1=$('#books1'), r2=$('#books2'); if(!r1||!r2) return; r1.innerHTML=''; r2.innerHTML='';
    const start=CFG.birthYear, end=CFG.year;
    const PAL=['#c9a227','#b8860b','#9a7b1f','#e6d28a','#8a6d3b','#5e4a1c','#d4af37','#7a5c1e','#caa75a','#403214'];
    const WID=['w1','w1','w2','w2','w2','w3','w3','w4'];   // 細め多めに重み付け
    const MS=CFG.milestones||{};
    const years=[]; for(let y=start;y<=end;y++) years.push(y);
    const mid=Math.ceil(years.length/2);                  // 上段・下段に二分
    years.forEach((y,idx)=>{
      const b=document.createElement('div');
      if(y===end){ b.className='book new'; b.style.height='100%';
        const t=document.createElement('span'); t.className='title'; t.textContent=y; b.appendChild(t);
      } else {
        const title=MS[String(y)];
        if(title){
          b.className='book milestone'; b.style.height=(86+Math.random()*14)+'%';
          const t=document.createElement('span'); t.className='title'; t.textContent=title; b.appendChild(t);
        } else {
          b.className='book '+WID[(Math.random()*WID.length)|0];
          b.style.setProperty('--c', PAL[(Math.random()*PAL.length)|0]);
          b.style.height=(54+Math.random()*44)+'%';        // 高さを完全ランダムに
        }
      }
      b.style.transitionDelay=(idx*18)+'ms';
      (idx<mid ? r1 : r2).appendChild(b);
    });
  }
  buildBooks();

  /* 最新刊に書き入れる言葉（ガラスペン） */
  function buildInscription(){
    const w=$('#obInscribe'); if(!w) return; w.innerHTML='';
    const lines=Array.isArray(CFG.inscription)?CFG.inscription:[CFG.inscription];
    lines.forEach(txt=>{
      const dur=Math.max(1800, String(txt).length*380);                // 文字数に応じた書く速さ（ゆっくり）
      const row=document.createElement('div'); row.className='ink-row';
      const line=document.createElement('span'); line.className='ink-line';
      line.style.setProperty('--d',(dur/1000)+'s'); line.dataset.dur=dur;
      const t=document.createElement('span'); t.className='ink-text'; t.textContent=txt;
      const pen=document.createElement('span'); pen.className='pen';
      line.appendChild(t); line.appendChild(pen); row.appendChild(line); w.appendChild(row);
    });
  }
  buildInscription();
  track('visit');   // サイトを開いた

  // 開いた本：1ページ＝1英文＋訳。スワイプでめくる
  let reviewPages=[], reviewIdx=0, reviewTurning=false, reviewAutoTimer=null;
  function clearReviewAuto(){ if(reviewAutoTimer){ clearTimeout(reviewAutoTimer); reviewAutoTimer=null; } }
  function scheduleReviewAuto(){ clearReviewAuto(); reviewAutoTimer=setTimeout(()=>{ if(awaitingPage) nextReviewPage(); }, 7000); }
  function buildReview(){
    const r=$('#obReview'); if(!r) return;
    const en=(theme&&theme.words)||[], ja=(theme&&theme.wordsJa)||[];
    reviewPages=en.map((line,i)=>({en:line, ja:ja[i]||''}));
    reviewIdx=0; reviewTurning=false; r.innerHTML='';
    const content=document.createElement('div'); content.className='rv-content';
    const leaf=document.createElement('div'); leaf.className='rv-leaf';
    const nav=document.createElement('div'); nav.className='rv-nav';
    r.appendChild(content); r.appendChild(leaf); r.appendChild(nav);
    renderReviewPage();
  }
  function renderReviewPage(){
    const c=$('#obReview .rv-content'); if(!c) return; c.innerHTML='';
    const p=reviewPages[reviewIdx]; if(!p) return;
    const e=document.createElement('div'); e.className='rv-en'; e.textContent=p.en;
    const j=document.createElement('div'); j.className='rv-ja'; j.textContent=p.ja;
    const n=document.createElement('div'); n.className='rv-count'; n.textContent=(reviewIdx+1)+' / '+reviewPages.length;
    c.appendChild(e); c.appendChild(j); c.appendChild(n);
    const nav=$('#obReview .rv-nav');
    if(nav) nav.textContent=(reviewIdx<reviewPages.length-1)?'← スワイプでめくる':'← スワイプで、人生の続きを';
  }
  function nextReviewPage(){
    if(!awaitingPage || reviewTurning) return;
    if(reviewIdx < reviewPages.length-1){
      reviewTurning=true; scheduleReviewAuto();
      const leaf=$('#obReview .rv-leaf'); if(leaf){ leaf.classList.remove('turn'); void leaf.offsetWidth; leaf.classList.add('turn'); }
      later(()=>{ reviewIdx++; renderReviewPage(); }, 400);          // めくり途中で中身を差し替え
      later(()=>{ if(leaf) leaf.classList.remove('turn'); reviewTurning=false; }, 840);
    } else {
      awaitingPage=false; clearReviewAuto(); startInscribe();        // 最後のページ → 綴りへ
    }
  }
  // フェーズ1：本が開き、英文＋訳が1ページずつ
  function openReviewScene(){
    track('open_book');
    buildReview();
    const ob=$('#openbook'), rv=$('#obReview'), ins=$('#obInscribe');
    rv.classList.remove('hide','in'); rv.style.display=''; ins.style.display='none';
    document.querySelectorAll('#obInscribe .ink-line').forEach(l=>l.classList.remove('go'));
    ob.style.display=''; ob.classList.remove('away'); ob.classList.add('show');
    later(()=> rv.classList.add('in'), 950);                          // 本が開いてから英文＋訳が浮かぶ
    later(()=>{ awaitingPage=true; scheduleReviewAuto(); }, 1200);    // スワイプ/タップで次へ（放置でも自動）
  }
  // フェーズ2：最後のページ → ガラスペンで「人生の続きを。」
  function startInscribe(){
    const rv=$('#obReview'), ins=$('#obInscribe');
    clearReviewAuto(); rv.classList.add('hide');
    later(()=>{ rv.style.display='none'; ins.style.display='flex'; runInscribe(); }, 700);
  }
  function runInscribe(){
    const ob=$('#openbook');
    const lines=[...document.querySelectorAll('#obInscribe .ink-line')];
    let t=300; lines.forEach(l=>{ const d=+l.dataset.dur; later(()=>l.classList.add('go'), t); t+=d+350; });
    const writeEnd=t+250;
    // 間（あわい）を大切に：所作ごとに呼吸を置く。ただし気配は絶やさない。
    later(()=> ob.classList.add('closing'), writeEnd+1000);             // ① 書いた言葉を味わってから、本が閉じる
    later(()=> ob.classList.add('away'),    writeEnd+2900);             // ② ひと呼吸（閉じた本がそっと光る）→ 棚へ
    later(()=>{ ob.classList.remove('show');                            //    暗幕が晴れ、棚に収まる
                const nb=$('.book.new'); if(nb) nb.classList.remove('await');
                addBurst(innerWidth/2, innerHeight*0.55); if(!running){ running=true; confLoop(); }
                track('finished'); }, writeEnd+3450);
    later(()=>{ ob.style.display='none'; ob.classList.remove('away','closing'); }, writeEnd+4100);
    later(()=> $('#shelfCaption').classList.add('in'), writeEnd+4600);  // ③ ひと呼吸おいて、結びの言葉
    later(()=> replay.classList.add('in'),             writeEnd+5700);
    later(()=> unfreezeScroll(),                       writeEnd+5800);  // 全て終えてスクロール解放
  }

  let shelfDone=false, frozenY=0, awaitingTap=false, awaitingPage=false;
  function freezeScroll(){ frozenY=window.scrollY; const b=document.body;
    b.style.position='fixed'; b.style.top=(-frozenY)+'px'; b.style.left='0'; b.style.right='0'; b.style.width='100%'; }
  function unfreezeScroll(){ const b=document.body; b.style.position=''; b.style.top=''; b.style.left=''; b.style.right=''; b.style.width=''; window.scrollTo(0,frozenY); }
  function triggerWriting(){ if(!awaitingTap) return; awaitingTap=false;
    const nb=$('.book.new'); if(nb) nb.classList.remove('await'); $('#tapHint').classList.remove('in');
    openReviewScene(); }                                  // まず英文＋訳のページを開く
  // 2026の本（とヒント）をタップで本が開く／開いた本にふれると綴りへ
  (function armBookTap(){
    const nb=$('.book.new'), hint=$('#tapHint'), ob=$('#openbook');
    if(nb)   nb.addEventListener('click', triggerWriting);
    if(hint) hint.addEventListener('click', triggerWriting);
    if(ob){                                                 // 開いた本：タップ／左スワイプでめくる
      ob.addEventListener('click', ()=> nextReviewPage());
      let sx=0;
      ob.addEventListener('touchstart', e=>{ sx=e.changedTouches[0].clientX; }, {passive:true});
      ob.addEventListener('touchend',  e=>{ if(e.changedTouches[0].clientX - sx < -35) nextReviewPage(); }, {passive:true});
    }
  })();
  new IntersectionObserver((es)=>{ es.forEach(e=>{ if(e.isIntersecting && !shelfDone){ shelfDone=true;
      track('bookshelf');
      $('#bookshelf').scrollIntoView({behavior:'smooth', block:'start'});  // 本棚を画面いっぱいに合わせる
      later(()=>{ freezeScroll();                                          // スクロールを固定（見逃し防止）
        document.querySelectorAll('.books').forEach(b=>b.classList.add('rise')); // 既刊が立ち上がる
        later(()=>{ const nb=$('.book.new'); if(nb) nb.classList.add('reveal'); }, 2600);   // 2026が棚に現れる
        later(()=>{ const nb=$('.book.new'); if(nb) nb.classList.add('await');             // 「ふれて」と促す
                    $('#tapHint').classList.add('in'); awaitingTap=true; }, 3900);
        later(()=>{ triggerWriting(); }, 11000);                          // タップが無ければ自動発動（見逃し防止）
      }, 750);
    }}); },{threshold:.45}).observe($('#bookshelf'));

  addEventListener('scroll',()=>{ if(scrollY>40){ const h=$('#scrollHint'); if(h) h.style.opacity=0; } },{passive:true});

  /* ===== フィナーレ演出 ===== */
  const cf=$('#confetti'), cctx=cf.getContext('2d');
  let cw,ch,conf=[],running=false,fired=false;
  function cfSize(){ cw=cf.width=innerWidth; ch=cf.height=innerHeight; }
  cfSize(); addEventListener('resize',cfSize);
  const palette=()=>[GOLD,SEC,'#fffbe9','#ffffff'];
  function addBurst(x,y){ const cols=palette(); for(let i=0;i<46;i++){ const a=Math.random()*6.283, sp=2+Math.random()*4.5;
    conf.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,grav:.045,r:1.5+Math.random()*2.5,shape:'c',col:cols[(Math.random()*cols.length)|0],life:1,decay:.012+Math.random()*.01,rot:0,vr:0}); } }
  function spawnConfetti(){ const cols=palette(); for(let i=0;i<170;i++){
    conf.push({x:Math.random()*cw,y:-20-Math.random()*ch*.5,w:4+Math.random()*7,h:7+Math.random()*12,vx:(Math.random()-.5)*1.6,vy:1.5+Math.random()*3.5,grav:.03,rot:Math.random()*6.3,vr:(Math.random()-.5)*.25,col:cols[(Math.random()*cols.length)|0],shape:'r',life:1,decay:.0035,sway:Math.random()*6.3}); } }
  function spawnEmbers(){ const cols=[SEC,'#fff1c0',GOLD]; for(let i=0;i<140;i++){
    conf.push({x:Math.random()*cw,y:ch+Math.random()*60,vx:(Math.random()-.5)*.7,vy:-(1+Math.random()*2.6),grav:-.002,r:1.5+Math.random()*3,shape:'c',col:cols[(Math.random()*cols.length)|0],life:1,decay:.005+Math.random()*.006,rot:0,vr:0}); } }
  function fireFinale(){ if(fired) return; fired=true; chord();
    const t=theme?theme.finale:'confetti';
    if(t==='fireworks'){ for(let k=0;k<6;k++) cinemaTimers.push(setTimeout(()=>addBurst(cw*(.25+Math.random()*.5),ch*(.2+Math.random()*.35)),k*430)); }
    else if(t==='embers'){ spawnEmbers(); }
    else { spawnConfetti(); }
    if(!running){ running=true; confLoop(); }
  }
  function confLoop(){ cctx.clearRect(0,0,cw,ch); let alive=0;
    for(const p of conf){ if(p.life<=0) continue; alive++;
      if(p.shape==='r'){ p.sway+=.05; p.x+=p.vx+Math.sin(p.sway)*.8; } else p.x+=p.vx;
      p.vy+=p.grav; p.y+=p.vy; p.rot+=p.vr; p.life-=p.decay;
      if(p.y>ch+40||p.y<-60) p.life=0;
      const al=Math.max(0,Math.min(1,p.life)); cctx.globalAlpha=al; cctx.fillStyle=p.col;
      if(p.shape==='r'){ cctx.save(); cctx.translate(p.x,p.y); cctx.rotate(p.rot); cctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); cctx.restore(); }
      else { cctx.beginPath(); cctx.arc(p.x,p.y,p.r,0,6.283); cctx.shadowBlur=8; cctx.shadowColor=p.col; cctx.fill(); cctx.shadowBlur=0; }
    }
    cctx.globalAlpha=1;
    if(alive>0) requestAnimationFrame(confLoop); else { running=false; cctx.clearRect(0,0,cw,ch); }
  }

  /* ===== もう一度（別の文字を選べる） ===== */
  replay.addEventListener('click',()=>{
    clearTimers(); fired=false; started=false; conf=[];
    document.querySelectorAll('.in').forEach(e=>e.classList.remove('in'));
    main.classList.remove('reveal'); main.setAttribute('aria-hidden','true');
    // 本棚リセット
    shelfDone=false; awaitingTap=false; document.querySelectorAll('.books').forEach(b=>b.classList.remove('rise'));
    document.querySelectorAll('.book.new').forEach(b=>b.classList.remove('reveal','await'));
    $('#tapHint').classList.remove('in');
    // 書き入れ場面リセット
    const ob=$('#openbook'); ob.classList.remove('show','away'); ob.style.display='';
    awaitingPage=false; reviewTurning=false; clearReviewAuto();
    $('#obReview').classList.remove('in','hide'); $('#obInscribe').style.display='none';
    document.querySelectorAll('.ink-line').forEach(l=>l.classList.remove('go'));
    document.body.style.position=''; document.body.style.top=''; document.body.style.left=''; document.body.style.right=''; document.body.style.width='';
    bodyEl.classList.add('locked');
    cinema.style.display=''; cinema.classList.remove('fade','show');
    $('#cDate').classList.remove('fade-io'); $('#cConcept').classList.remove('fade-io');
    $('#cName').className='cine-line cine-name'; $('#cName').innerHTML='';
    $('#cCount').className='cine-count'; $('#cCount').textContent=''; $('#cCount').style.opacity='';
    gate.style.display=''; gate.classList.remove('gone');
    const h=$('#scrollHint'); if(h) h.style.opacity='';
    initBG('dust');
    window.scrollTo(0,0);
  });

})();
</script>
</body>
